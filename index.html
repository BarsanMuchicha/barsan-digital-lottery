<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Barsan Lottery</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { --bg-color: #0f0f0f; --primary-color: #2481cc; --text-main: #ffffff; }
    body { background: var(--bg-color); color: var(--text-main); font-family: sans-serif; padding: 20px; }
    .btn { background: var(--primary-color); color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; margin-top: 10px; }
    .lottery-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
    .num-node { padding: 20px; background: #1c1c1c; text-align: center; border-radius: 8px; }
    .selected { background: var(--primary-color); }
  </style>
</head>
<body>
  <h1>Barsan Lottery</h1>
  <div id="view-buy">
    <div id="numbers-grid" class="lottery-grid"></div>
    <button class="btn" onclick="checkout()">Lock & Proceed</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    const user = tg.initDataUnsafe.user || { id: 'anonymous' };

    // Render Grid
    const grid = document.getElementById('numbers-grid');
    for(let i=1; i<=25; i++) {
        const div = document.createElement('div');
        div.className = 'num-node'; div.innerText = i;
        div.onclick = () => div.classList.toggle('selected');
        grid.appendChild(div);
    }

    async function checkout() {
        const selected = Array.from(document.querySelectorAll('.selected')).map(el => el.innerText);
        const res = await fetch('/api/orders/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': tg.initData },
            body: JSON.stringify({ userId: user.id, roundId: 12, numbers: selected, amount: 200 })
        });
        const data = await res.json();
        alert('Order Created: ' + data.orderId);
    }
  </script>
</body>
</html>
